version: '3.8'

services:
  app:
    build: .
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - mongo
    networks:
      - social-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - social-net

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db
    networks:
      - social-net

volumes:
  mongo-data:

networks:
  social-net:
    driver: bridge
